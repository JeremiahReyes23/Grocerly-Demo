<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in with Apple ID</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #121212;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 0;
    }
    .login-box {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      text-align: center;
      box-sizing: border-box;
    }
    .apple-logo {
      font-size: 48px;
      margin-bottom: 24px;
      color: #ffffff;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 12px 0;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 14px;
      color: #86868b;
      margin-bottom: 32px;
      line-height: 1.4;
    }
    .input-container {
      position: relative;
      margin-bottom: 20px;
      text-align: left;
    }
    .input-field {
      width: 100%;
      background-color: #1c1c1e;
      border: 1px solid #3a3a3c;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 16px;
      color: #ffffff;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field:focus {
      border-color: #0071e3;
    }
    .input-label {
      font-size: 11px;
      font-weight: 600;
      color: #86868b;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }
    .btn-next {
      background-color: #ffffff;
      color: #000000;
      border: none;
      border-radius: 20px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 16px;
      transition: background-color 0.2s;
    }
    .btn-next:hover {
      background-color: #f5f5f7;
    }
    .btn-back {
      background: none;
      border: none;
      color: #86868b;
      font-size: 14px;
      cursor: pointer;
      margin-top: 16px;
    }
    .btn-back:hover {
      color: #ffffff;
    }
    .privacy-info {
      font-size: 12px;
      color: #86868b;
      margin-top: 40px;
      line-height: 1.4;
    }
    .privacy-info a {
      color: #0071e3;
      text-decoration: none;
    }
    /* Loading Spinner */
    .spinner-overlay {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #121212;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    .spinner {
      border: 3px solid #333;
      border-top: 3px solid #ffffff;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    /* Password View */
    .password-view {
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-box" style="position: relative; min-height: 480px;">
    
    <!-- Spinner -->
    <div class="spinner-overlay" id="spinner-view">
      <div class="spinner"></div>
      <div style="font-size: 14px; color: #86868b;">Connecting to Apple...</div>
    </div>

    <!-- Email View -->
    <div id="email-view">
      <div class="apple-logo"><i class="fab fa-apple"></i></div>
      <h1>Sign in with Apple ID</h1>
      <div class="subtitle">Use your Apple ID to sign in to Grocerly.</div>

      <div class="input-container">
        <label class="input-label" for="apple-id">Apple ID</label>
        <input type="email" id="apple-id" class="input-field" placeholder="name@example.com" required>
      </div>

      <button class="btn-next" onclick="showPasswordView()">Continue</button>
      
      <div class="privacy-info">
        Your Apple ID is the account you use for all Apple services. <a href="#">Create yours now</a> or learn more about <a href="#">Apple ID & Privacy</a>.
      </div>
    </div>

    <!-- Password View -->
    <div id="password-view" class="password-view">
      <div class="apple-logo"><i class="fab fa-apple"></i></div>
      <h1>Enter Password</h1>
      <div class="subtitle" id="user-email-display">name@example.com</div>

      <div class="input-container">
        <label class="input-label" for="apple-password">Password</label>
        <input type="password" id="apple-password" class="input-field" placeholder="••••••••" required>
      </div>

      <button class="btn-next" onclick="submitAppleLogin()">Sign In</button>
      <button class="btn-back" onclick="showEmailView()">Back</button>
    </div>

  </div>

  <script>
    let userEmail = "";

    function showPasswordView() {
      const email = document.getElementById("apple-id").value.trim();
      if (!email || !email.includes("@")) {
        alert("Enter a valid Apple ID");
        return;
      }
      userEmail = email;
      document.getElementById("user-email-display").textContent = email;
      document.getElementById("email-view").style.display = "none";
      document.getElementById("password-view").style.display = "block";
      document.getElementById("apple-password").focus();
    }

    function showEmailView() {
      document.getElementById("password-view").style.display = "none";
      document.getElementById("email-view").style.display = "block";
      document.getElementById("apple-id").focus();
    }

    function submitAppleLogin() {
      const password = document.getElementById("apple-password").value.trim();
      if (!password || password.length < 4) {
        alert("Enter a valid password");
        return;
      }

      document.getElementById("spinner-view").style.display = "flex";
      
      setTimeout(() => {
        const namePart = userEmail.split("@")[0];
        const displayName = namePart.charAt(0).toUpperCase() + namePart.slice(1);
        
        if (window.opener) {
          window.opener.postMessage({
            type: "oauth-success",
            provider: "Apple",
            email: userEmail,
            name: displayName,
            avatar: ""
          }, "*");
        }
        window.close();
      }, 1200);
    }
  </script>
</body>
</html>
